<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ambient Pads - Sintetizador de sons envolventes. Clique para tocar/pausar notas musicais suaves em loop."
    />
    <meta name="theme-color" content="#0a0a1a" />
    <title>AMBIENT PADS - Sintetizador de Sons</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container-principal">
      <header>
        <h1 class="titulo">🎹 AMBIENT PADS</h1>
        <p class="subtitulo">Clique para tocar/pausar os pads musicais</p>
      </header>

      <section class="secao-bateria">
        <div class="conteudo" id="conteudo"></div>
      </section>

      <footer class="rodape">
        <p>
          Clique nos pads ou use: <strong>A, B, C, D, E, F, G</strong> (notas) |
          <strong>1, 2, 3, 4, 5</strong> (sustenidos)
        </p>
      </footer>
    </main>

    <script src="drum.js"></script>
  </body>
</html>
