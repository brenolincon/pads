<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMBIENT PADS</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- LOADER CINEMATOGRÁFICO -->
    <div id="loader-screen">
      <div class="loader-content">
        <div class="logo-glow">🎹</div>
        <h1 class="loader-title">AMBIENT PADS</h1>
        <p class="loader-status" id="loader-status">
          Inicializando ambiente sonoro...
        </p>

        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>

    <main id="app" hidden class="container-principal">
      <header>
        <h1 class="titulo">🎹 AMBIENT PADS</h1>
        <p class="subtitulo">Clique para tocar/pausar os pads musicais</p>
      </header>

      <div class="mixer">
        <div class="fader-group">
          <label>PADS</label>
          <input
            type="range"
            id="padsVolume"
            min="0"
            max="1"
            step="0.01"
            value="1"
          />
        </div>

        <div class="fader-group">
          <label>DRUMS</label>
          <input
            type="range"
            id="drumsVolume"
            min="0"
            max="1"
            step="0.01"
            value="1"
          />
        </div>
      </div>

      <div class="mixer-buttons">
        <div class="group">
          <button id="padsMute">Mute Pads</button>
          <button id="padsSolo">Solo Pads</button>
        </div>

        <div class="group">
          <button id="drumsMute">Mute Drums</button>
          <button id="drumsSolo">Solo Drums</button>
        </div>
      </div>

      <section class="secao-bateria">
        <!-- PADS FIXOS -->
        <div class="conteudo" id="pads">
          <button class="tecla" data-nota="A">A</button>
          <button class="tecla" data-nota="A#">A#</button>
          <button class="tecla" data-nota="B">B</button>
          <button class="tecla" data-nota="C">C</button>
          <button class="tecla" data-nota="C#">C#</button>
          <button class="tecla" data-nota="D">D</button>
          <button class="tecla" data-nota="D#">D#</button>
          <button class="tecla" data-nota="E">E</button>
          <button class="tecla" data-nota="F">F</button>
          <button class="tecla" data-nota="F#">F#</button>
          <button class="tecla" data-nota="G">G</button>
          <button class="tecla" data-nota="G#">G#</button>
        </div>

        <!-- DRUM -->
        <div class="drum-conteudo" id="drums">
          <button class="tecla" data-drum="a">A</button>
          <button class="tecla" data-drum="s">S</button>
          <button class="tecla" data-drum="d">D</button>
          <button class="tecla" data-drum="f">F</button>
          <button class="tecla" data-drum="g">G</button>
          <button class="tecla" data-drum="h">H</button>
          <button class="tecla" data-drum="f">F</button>
          <button class="tecla" data-drum="g">G</button>
          <button class="tecla" data-drum="h">H</button>
        </div>
      </section>

      <footer class="rodape">Desenvolvido por Breno Oliveira</footer>
    </main>

    <script src="pads.js"></script>
  </body>
</html>
